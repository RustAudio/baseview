[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "none"
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0"
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[graph]
all-features = true

[bans]
#multiple-versions = "deny"
wildcards = "deny"
